components:
  schemas:
    AISearchResult:
      type: object
      properties:
        normalized_query:
          type: string
        interpretation:
          $ref: '#/components/schemas/SearchInterpretation'
        meals:
          type: array
          items:
            $ref: '#/components/schemas/RecommendedProduct'
        chefs:
          type: array
          items:
            $ref: '#/components/schemas/RecommendedChef'
      required:
      - chefs
      - interpretation
      - meals
      - normalized_query
    ApprovedEnum:
      enum:
      - pending
      - approved
      - rejected
      type: string
      description: |-
        * `pending` - Pending
        * `approved` - Approved
        * `rejected` - Rejected
    AuditLog:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        user_name:
          type: string
          title: اسم المستخدم
          description: مطلوب. 150 رمزاً أو أقل، مكونة من حروف وأرقام و @/./+/-/_ فقط
          readOnly: true
        action:
          type: string
          maxLength: 120
        object_type:
          type: string
          maxLength: 120
        object_id:
          type: string
          maxLength: 120
        metadata: {}
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - action
      - created_at
      - id
      - user_name
    CartItem:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        product:
          type: integer
        product_name:
          type: string
          readOnly: true
        product_price:
          type: string
          format: decimal
          pattern: ^-?\d{0,6}(?:\.\d{0,2})?$
          readOnly: true
        product_image:
          type: string
          format: uri
          readOnly: true
        preparation_time:
          type: integer
          maximum: 9223372036854775807
          minimum: 0
          format: int64
          description: Minutes
          readOnly: true
        pickup_address:
          type: string
          readOnly: true
        quantity:
          type: integer
          maximum: 9223372036854775807
          minimum: 0
          format: int64
        total_price:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
          readOnly: true
      required:
      - id
      - pickup_address
      - preparation_time
      - product
      - product_image
      - product_name
      - product_price
      - total_price
    CategoryEnum:
      enum:
      - breakfast
      - lunch
      - dinner
      - healthy
      - dessert
      type: string
      description: |-
        * `breakfast` - Breakfast
        * `lunch` - Lunch
        * `dinner` - Dinner
        * `healthy` - Healthy
        * `dessert` - Dessert
    Center:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
        name_ar:
          type: string
          readOnly: true
        name_en:
          type: string
          readOnly: true
        slug:
          type: string
          maxLength: 140
          pattern: ^[-a-zA-Z0-9_]+$
      required:
      - id
      - name
      - name_ar
      - name_en
      - slug
    ChatMessage:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        order:
          type: integer
        chat:
          type: integer
          readOnly: true
        sender:
          type: integer
          readOnly: true
        sender_name:
          type: string
          title: اسم المستخدم
          description: مطلوب. 150 رمزاً أو أقل، مكونة من حروف وأرقام و @/./+/-/_ فقط
          readOnly: true
        message:
          type: string
        message_type:
          allOf:
          - $ref: '#/components/schemas/MessageTypeEnum'
          readOnly: true
        image:
          type: string
          format: uri
          nullable: true
          pattern: (?:jpg|jpeg|png|webp|gif)$
        video:
          type: string
          format: uri
          nullable: true
          pattern: (?:mp4|webm|mov)$
        reply_to:
          type: integer
          nullable: true
        reply:
          allOf:
          - $ref: '#/components/schemas/ReplyPreview'
          readOnly: true
        status:
          allOf:
          - $ref: '#/components/schemas/MessageDeliveryStateEnum'
          readOnly: true
        is_deleted:
          type: boolean
          readOnly: true
        can_delete_for_everyone:
          type: boolean
          readOnly: true
        delivered_at:
          type: string
          format: date-time
          readOnly: true
          nullable: true
        read_at:
          type: string
          format: date-time
          readOnly: true
          nullable: true
        deleted_for_everyone_at:
          type: string
          format: date-time
          readOnly: true
          nullable: true
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - can_delete_for_everyone
      - chat
      - created_at
      - deleted_for_everyone_at
      - delivered_at
      - id
      - is_deleted
      - message_type
      - order
      - read_at
      - reply
      - sender
      - sender_name
      - status
    ChefRegister:
      type: object
      properties:
        username:
          type: string
          title: اسم المستخدم
          description: مطلوب. 150 رمزاً أو أقل، مكونة من حروف وأرقام و @/./+/-/_ فقط
          pattern: ^[\w.@+-]+$
          maxLength: 150
        email:
          type: string
          format: email
        password:
          type: string
          writeOnly: true
        password_confirm:
          type: string
          writeOnly: true
        first_name:
          type: string
          title: الاسم الأول
          maxLength: 150
        last_name:
          type: string
          title: الاسم الأخير
          maxLength: 150
        kitchen_name:
          type: string
          maxLength: 180
        governorate:
          type: string
          maxLength: 120
        center:
          type: string
          maxLength: 120
        age:
          type: integer
          maximum: 80
          minimum: 18
        national_id:
          type: string
          writeOnly: true
          pattern: ^\d{14}$
        food_description:
          type: string
          maxLength: 1000
        pickup_address:
          type: string
          maxLength: 500
      required:
      - age
      - center
      - email
      - governorate
      - kitchen_name
      - national_id
      - password
      - password_confirm
      - pickup_address
      - username
    Conversation:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        order_id:
          type: integer
          readOnly: true
        other_user:
          type: object
          additionalProperties: {}
          readOnly: true
        last_message:
          type: object
          additionalProperties: {}
          nullable: true
          readOnly: true
        unread_count:
          type: integer
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - id
      - last_message
      - order_id
      - other_user
      - unread_count
      - updated_at
    EmailVerification:
      type: object
      properties:
        uid:
          type: string
        token:
          type: string
      required:
      - token
      - uid
    Favorite:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        product:
          type: integer
        product_name:
          type: string
          readOnly: true
        product_price:
          type: string
          format: decimal
          pattern: ^-?\d{0,6}(?:\.\d{0,2})?$
          readOnly: true
        product_image:
          type: string
          format: uri
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - id
      - product
      - product_image
      - product_name
      - product_price
    Governorate:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        icon:
          type: string
          maxLength: 16
        name:
          type: string
        name_ar:
          type: string
          readOnly: true
        name_en:
          type: string
          readOnly: true
        slug:
          type: string
          maxLength: 140
          pattern: ^[-a-zA-Z0-9_]+$
        estimated_population:
          type: integer
          maximum: 9223372036854775807
          minimum: 0
          format: int64
        population_as_of:
          type: string
          format: date
          nullable: true
        centers:
          type: array
          items:
            $ref: '#/components/schemas/Center'
          readOnly: true
      required:
      - centers
      - id
      - name
      - name_ar
      - name_en
      - slug
    Login:
      type: object
      properties:
        username:
          type: string
          writeOnly: true
        password:
          type: string
          writeOnly: true
      required:
      - password
      - username
    Logout:
      type: object
      properties:
        refresh:
          type: string
      required:
      - refresh
    MessageDeliveryStateEnum:
      enum:
      - sent
      - delivered
      - seen
      type: string
      description: |-
        * `sent` - sent
        * `delivered` - delivered
        * `seen` - seen
    MessageTypeEnum:
      enum:
      - text
      - image
      - video
      type: string
      description: |-
        * `text` - Text
        * `image` - Image
        * `video` - Video
    Notification:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        title:
          type: string
          maxLength: 180
        content:
          type: string
        notification_type:
          $ref: '#/components/schemas/NotificationTypeEnum'
        read:
          type: boolean
        order:
          type: integer
          nullable: true
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - content
      - created_at
      - id
      - notification_type
      - title
    NotificationTypeEnum:
      enum:
      - order_update
      - message
      - seller_approval
      type: string
      description: |-
        * `order_update` - Order Update
        * `message` - Message
        * `seller_approval` - Seller Approval
    Order:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        seller_name:
          type: string
          readOnly: true
        user_name:
          type: string
          title: اسم المستخدم
          description: مطلوب. 150 رمزاً أو أقل، مكونة من حروف وأرقام و @/./+/-/_ فقط
          readOnly: true
        total_price:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
        commission_rate:
          type: string
          format: decimal
          pattern: ^-?\d{0,3}(?:\.\d{0,2})?$
        platform_fee:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
        seller_earnings:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
        status:
          $ref: '#/components/schemas/OrderStateEnum'
        items:
